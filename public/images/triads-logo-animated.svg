<svg width="320" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">
<style>
  .icon-part    { opacity:0; animation: fadeIn 0.6s ease 0.1s forwards; }
  .slide-letter { opacity:0; transform:translateY(18px); animation: slideUp 0.45s cubic-bezier(0.22,1,0.36,1) forwards; }
  @keyframes fadeIn  { to { opacity:1; } }
  @keyframes slideUp { to { opacity:1; transform:translateY(0); } }
  .s-t { animation-delay:0.7s; }
  .s-r { animation-delay:1.0s; }
  .s-i { animation-delay:1.3s; }
  .s-a { animation-delay:1.6s; }
  .s-d { animation-delay:1.9s; }
  .s-s { animation-delay:2.2s; }
</style>

<g transform="translate(340,28)">

  <g class="icon-part">
    <!-- Base rect -->
    <rect x="-49.5" y="144" width="99" height="36" rx="7" fill="#534AB7"/>

    <!-- Left spoke hourglass -->
    <polygon points="-84,22.5 -72,22.5 -56,83 -26,144 -40,144 -54,83" fill="#534AB7"/>
    <!-- Middle spoke hourglass -->
    <polygon points="-6,22.5 6,22.5 1,83 7,144 -7,144 -1,83" fill="#534AB7"/>
    <!-- Right spoke hourglass -->
    <polygon points="72,22.5 84,22.5 54,83 40,144 26,144 56,83" fill="#534AB7"/>

    <!-- Three cap bars -->
    <rect x="-111.75" y="0" width="67.5" height="22.5" rx="5" fill="#534AB7"/>
    <rect x="-33.75"  y="0" width="67.5" height="22.5" rx="5" fill="#534AB7"/>
    <rect x="44.25"   y="0" width="67.5" height="22.5" rx="5" fill="#534AB7"/>

    <!-- 3 → 1 in monospace, all on same optical centerline -->
    <text x="-18" y="167.5" text-anchor="middle"
      font-size="16" font-weight="700"
      font-family="'Courier New',Courier,monospace" fill="white">3</text>

    <line x1="-7" y1="164.5" x2="5" y2="164.5"
      stroke="white" stroke-width="2" stroke-linecap="round"/>
    <polygon points="5,161 13,164.5 5,168" fill="white"/>

    <text x="22" y="167.5" text-anchor="middle"
      font-size="16" font-weight="700"
      font-family="'Courier New',Courier,monospace" fill="white">1</text>
  </g>

  <!-- TRIADS letters sliding up one by one -->
  <text x="-91"   y="93" text-anchor="middle" font-size="28" font-weight="500"
    font-family="Georgia,serif" fill="#2E2E2E" class="slide-letter s-t">T</text>
  <text x="-54.6" y="93" text-anchor="middle" font-size="28" font-weight="500"
    font-family="Georgia,serif" fill="#2E2E2E" class="slide-letter s-r">R</text>
  <text x="-18.2" y="93" text-anchor="middle" font-size="28" font-weight="500"
    font-family="Georgia,serif" fill="#2E2E2E" class="slide-letter s-i">I</text>
  <text x="18.2"  y="93" text-anchor="middle" font-size="28" font-weight="500"
    font-family="Georgia,serif" fill="#2E2E2E" class="slide-letter s-a">A</text>
  <text x="54.6"  y="93" text-anchor="middle" font-size="28" font-weight="500"
    font-family="Georgia,serif" fill="#2E2E2E" class="slide-letter s-d">D</text>
  <text x="91"    y="93" text-anchor="middle" font-size="28" font-weight="500"
    font-family="Georgia,serif" fill="#2E2E2E" class="slide-letter s-s">S</text>

</g>
</svg>
