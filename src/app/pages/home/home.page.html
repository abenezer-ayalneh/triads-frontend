<div class="w-full h-full relative">
	@if (store.user()) {
		<div class="w-full h-full flex flex-col justify-center items-center gap-4 px-4">
			<div class="w-full max-w-md flex flex-col items-center">
				<div class="w-80 max-w-full">
					<app-brain-warming-play-button [buttonClasses]="'triad-gradient btn btn-lg w-full border-none text-primary-content'" />
				</div>
			</div>
		</div>
	} @else {
		<app-user-info-dialog />
	}

	@if (!store.introShownPerSession()) {
		<app-intro />
	}
</div>
