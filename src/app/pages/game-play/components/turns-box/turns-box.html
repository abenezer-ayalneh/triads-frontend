<div
	class="w-full h-full flex flex-col justify-center items-center gap-2 border border-base-100/20 shadow-2xl px-4 landscape:max-lg:px-4 md:px-5 lg:px-6 py-0.5 md:py-2 lg:py-3 rounded-lg bg-neutral/30 backdrop-blur-sm">
	<p class="text-base-300 text-sm landscape:max-lg:text-sm md:text-xl lg:text-2xl font-medium">Turns</p>
	<div class="w-full flex justify-center items-center min-h-[1.5rem] md:min-h-12">
		@if (displayTurnIconUrl(); as iconUrl) {
			<span
				class="inline-flex w-6 h-6 md:w-12 md:h-12 landscape:md:w-6 landscape:md:h-6 lg:w-12 lg:h-12 landscape:lg:w-12 landscape:lg:h-12"
				[class.turn-pulse]="isLastTurnAndNoHints()">
				<img [src]="iconUrl" alt="" class="w-full h-full" />
			</span>
		}
	</div>
</div>
