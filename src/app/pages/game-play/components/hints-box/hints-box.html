<div
	class="w-full h-full flex flex-col justify-center items-center gap-2 border border-base-100/20 shadow-2xl px-2 py-0.5 md:py-2 lg:py-3 rounded-lg bg-neutral/30 backdrop-blur-sm">
	<p class="text-base-300 text-sm landscape:max-lg:text-sm md:text-xl lg:text-2xl font-medium">Hints</p>
	<div class="w-full flex justify-center items-center gap-2">
		@let isLoading = store.isFetchingHint() || store.isCheckingTriad();
		@let hintsDisabledDueToTurns = areHintsDisabledDueToTurns();
		@for (hint of store.hints(); track hint.id) {
			<button
				type="button"
				class="hint-button w-6 h-6 md:w-12 md:h-12 landscape:md:w-6 landscape:md:h-6 lg:w-12 lg:h-12 landscape:lg:w-12 landscape:lg:h-12 circle relative disabled:cursor-not-allowed"
				[class.hint-button--used]="!hint.available"
				[class.hint-button--busy]="hint.available && isLoading"
				[class.grayscale]="hintsDisabledDueToTurns"
				(click)="onHintClick()"
				[disabled]="!hint.available || isLoading || hintsDisabledDueToTurns"
				[attr.aria-label]="hint.available ? 'Use a hint' : 'Hint already used'">
				@if (hint.available && isLoading) {
					<span class="loading loading-spinner loading-xs absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"></span>
				} @else {
					<span class="relative block w-full h-full">
						<img [src]="lifesaverIconUrl()" alt="" class="hint-button__icon" />
						@if (!hint.available) {
							<span class="hint-button__cross" aria-hidden="true">
								<svg
									class="hint-button__cross-svg"
									viewBox="0 0 24 24"
									fill="none"
									stroke="currentColor"
									stroke-width="3"
									stroke-linecap="round">
									<path d="M5 5l14 14M19 5L5 19" />
								</svg>
							</span>
						}
					</span>
				}
			</button>
		}
	</div>
</div>

<!-- Hint Choice Modal -->
<dialog #hintChoiceModal class="modal modal-bottom sm:modal-middle">
	<div class="modal-box">
		<h3 class="text-lg font-bold">Choose your hint</h3>
		<p class="py-2 text-sm">Pick one of the options below to help solve the Triad.</p>
		<div class="w-full h-fit flex flex-col gap-2 mt-2">
			<button
				type="button"
				class="btn btn-info text-base-100 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
				[disabled]="store.usedHintTypes().includes('KEYWORD_LENGTH') || store.isFetchingHint() || areHintsDisabledDueToTurns()"
				(click)="useHint('KEYWORD_LENGTH')">
				@if (store.isFetchingHint()) {
					<span class="loading loading-spinner loading-sm"></span>
				}
				<span>Number of letters</span>
			</button>
			<button
				type="button"
				class="btn btn-primary text-base-100 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
				[disabled]="store.usedHintTypes().includes('FIRST_LETTER') || store.isFetchingHint() || areHintsDisabledDueToTurns()"
				(click)="useHint('FIRST_LETTER')">
				@if (store.isFetchingHint()) {
					<span class="loading loading-spinner loading-sm"></span>
				}
				<span>1st letter of word</span>
			</button>
		</div>

		<div class="modal-action">
			<form method="dialog">
				<button class="btn">Cancel</button>
			</form>
		</div>
	</div>
</dialog>
