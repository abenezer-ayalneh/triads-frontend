<ion-header class="ion-no-border" [class.overlay-visible]="overlayVisible()" [class.daily-toolbar]="store.gameMode() === 'daily'">
	<ion-toolbar>
		<app-header />
	</ion-toolbar>
</ion-header>
<ion-content [fullscreen]="true">
	<ion-router-outlet />
	@if (store.showHowToPlay()) {
		<app-how-to-play />
	}
</ion-content>
