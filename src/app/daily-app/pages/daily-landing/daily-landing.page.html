<div class="flex h-full w-full flex-col items-center justify-center gap-3 px-4 py-6 text-center">
	<div class="flex w-full max-w-md flex-col items-center gap-3">
		<img
			src="images/triads-logo-animated.svg"
			alt="Triads"
			decoding="async"
			class="mx-auto h-auto w-full max-w-70 object-contain scale-200"
			width="280"
			height="200" />

		<p class="text-xl font-semibold leading-snug text-base-content md:text-2xl">{{ tagline }}</p>
		@if (!challengeLoading() && challengeLine(); as line) {
			<p class="text-lg font-semibold leading-snug text-base-content md:text-xl">{{ line }}</p>
		}
		@if (!challengeLoading() && !dailyScheduled()) {
			<p class="text-sm leading-snug text-base-content/70 md:text-base">No daily game is scheduled for today. Please check back later.</p>
		}
		<!--		<p class="text-sm text-base-content/80 md:text-base">{{ attribution }}</p>-->

		@if (!dailyScheduled()) {
			<button
				type="button"
				disabled
				class="btn btn-lg mt-2 w-80 max-w-full cursor-not-allowed border-2 border-base-300/40 bg-base-100/50 font-semibold text-base-content shadow-md backdrop-blur-sm">
				No game today
			</button>
		} @else if (dailyCompleted()) {
			<button
				type="button"
				disabled
				class="btn btn-lg mt-2 w-80 max-w-full cursor-not-allowed border-2 border-base-300/40 bg-base-100/50 font-semibold text-base-content shadow-md backdrop-blur-sm">
				Come back tomorrow
			</button>
		} @else {
			<button
				type="button"
				class="triad-gradient btn btn-lg mt-2 w-80 max-w-full border-none text-primary-content"
				[class.pointer-events-none]="playAnimationRunning()"
				[attr.aria-busy]="playAnimationRunning() ? 'true' : null"
				(click)="onPlayNow()">
				<span class="daily-play-inner">
					<span class="daily-play-spacer" aria-hidden="true">brain warming up . . .</span>
					<span #playLabel class="daily-play-label">Play Now</span>
					<span #bt1 class="daily-play-text" style="color: #bbbbbb; opacity: 0">brain warming up . . .</span>
					<span #bt2 class="daily-play-text" style="opacity: 0">
						<span #bPrefix class="daily-play-prefix">brain getting</span>
						<span #bHot class="daily-play-hot">hot</span>
					</span>
				</span>
			</button>
		}
	</div>
</div>
